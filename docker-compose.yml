version: "3.8"

services:
  # Frontend Web Application
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: smartlab-frontend
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
    networks:
      - smartlab-network
    restart: unless-stopped

networks:
  smartlab-network:
    driver: bridge
